server {
    server_name pulse.whatshubb.co.za;
    root /var/www/sapulse;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy EONET NASA API
    location /proxy/eonet/ {
        proxy_pass https://eonet.gsfc.nasa.gov/api/v3/;
        proxy_ssl_server_name on;
        proxy_set_header Host eonet.gsfc.nasa.gov;
        proxy_set_header User-Agent "SA-Pulse/1.0";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # Proxy USGS Earthquake API
    location /proxy/usgs/ {
        proxy_pass https://earthquake.usgs.gov/fdsnws/event/1/;
        proxy_ssl_server_name on;
        proxy_set_header Host earthquake.usgs.gov;
        proxy_set_header User-Agent "SA-Pulse/1.0";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # Proxy Open-Meteo
    location /proxy/weather/ {
        proxy_pass https://api.open-meteo.com/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.open-meteo.com;
        proxy_set_header User-Agent "SA-Pulse/1.0";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=1800";
    }

    # Proxy GDACS RSS (disaster alerts)
    location /proxy/gdacs/ {
        proxy_pass https://www.gdacs.org/xml/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.gdacs.org;
        proxy_set_header User-Agent "SA-Pulse/1.0";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=1800";
    }

    # Proxy EMSC Seismic Portal
    location /proxy/emsc/ {
        proxy_pass https://www.seismicportal.eu/fdsnws/event/1/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.seismicportal.eu;
        proxy_set_header User-Agent "SA-Pulse/1.0";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=900";
    }

    # Proxy OpenSky Network (live aircraft)
    location /proxy/opensky/ {
        proxy_pass https://opensky-network.org/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host opensky-network.org;
        proxy_set_header User-Agent "SA-Pulse/1.0";
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=30";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pulse.whatshubb.co.za/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pulse.whatshubb.co.za/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = pulse.whatshubb.co.za) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name pulse.whatshubb.co.za;
    return 404; # managed by Certbot


}